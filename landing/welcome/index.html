<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Labryx Pro!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e; --accent: #7c6ff7; --text: #e2e8f0; --muted: #64748b; --green: #34d399; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .card { max-width: 520px; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 1rem; }
    p { color: var(--muted); font-size: 1.05rem; margin-bottom: 2rem; }
    .steps { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.75rem; text-align: left; margin-bottom: 2rem; }
    .steps h3 { font-size: 0.8rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 1.25rem; }
    .step { display: flex; gap: 1rem; margin-bottom: 1rem; align-items: flex-start; }
    .step:last-child { margin-bottom: 0; }
    .step-num { background: var(--accent); color: #fff; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
    .step-text { font-size: 0.9rem; padding-top: 2px; }
    .step-text code { background: #1a1a2e; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.85rem; color: var(--accent); }
    .btn { display: inline-block; background: var(--accent); color: #fff; font-weight: 700; padding: 0.85rem 2rem; border-radius: 8px; text-decoration: none; }
    .btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Welcome to Labryx Pro!</h1>
    <p>Your subscription is active. Here's how to get started.</p>

    <div class="steps">
      <h3>Get started</h3>
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Install the CLI: <code>npm install -g labryx</code></div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">Log in with your Pro account: <code>labryx auth --login</code></div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">Build your first workflow: <code>labryx workflow --interactive</code></div>
      </div>
    </div>

    <a href="https://github.com/labryxdev/labryx" class="btn">View Docs on GitHub →</a>
  </div>
</body>
</html>
