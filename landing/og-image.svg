<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#13131a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6ff7"/>
      <stop offset="100%" style="stop-color:#4fd1c5"/>
    </linearGradient>
    <linearGradient id="linegrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c6ff7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#7c6ff7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4fd1c5;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#7c6ff7" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Glow orb -->
  <circle cx="600" cy="315" r="250" fill="#7c6ff7" opacity="0.05"/>

  <!-- L mark -->
  <g filter="url(#glow)" transform="translate(140, 190)">
    <rect x="0" y="0" width="22" height="140" fill="url(#accent)" rx="5"/>
    <rect x="0" y="118" width="90" height="22" fill="url(#accent)" rx="5"/>
  </g>

  <!-- LABRYX -->
  <text x="255" y="300" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="90" fill="#ffffff" letter-spacing="4">LABRYX</text>

  <!-- Tagline -->
  <text x="255" y="350" font-family="Arial, sans-serif" font-size="26" fill="#64748b" letter-spacing="0.5">AI workflow automation for the terminal</text>

  <!-- npm pill -->
  <rect x="255" y="378" width="310" height="48" rx="10" fill="#13131a" stroke="#1e1e2e" stroke-width="1.5"/>
  <text x="278" y="410" font-family="'Courier New', monospace" font-size="20" fill="#4fd1c5">npm install -g labryx</text>

  <!-- Badges row -->
  <rect x="255" y="448" width="120" height="32" rx="6" fill="rgba(124,111,247,0.15)" stroke="rgba(124,111,247,0.3)" stroke-width="1"/>
  <text x="315" y="469" font-family="Arial, sans-serif" font-size="14" fill="#7c6ff7" text-anchor="middle" font-weight="700">FREE &amp; OPEN SOURCE</text>

  <rect x="388" y="448" width="80" height="32" rx="6" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <text x="428" y="469" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle" font-weight="700">CLI FIRST</text>

  <!-- labryx.dev -->
  <text x="255" y="556" font-family="Arial, sans-serif" font-size="22" fill="#7c6ff7" letter-spacing="1">labryx.dev</text>

  <!-- Bottom line -->
  <rect x="0" y="618" width="1200" height="2" fill="url(#linegrad)" opacity="0.7"/>
</svg>