<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6ff7"/>
      <stop offset="100%" style="stop-color:#4fd1c5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="40"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#7c6ff7" stroke-width="1">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>

  <!-- Glow orb -->
  <circle cx="200" cy="195" r="90" fill="#7c6ff7" opacity="0.08"/>
  <circle cx="200" cy="195" r="60" fill="#7c6ff7" opacity="0.07"/>

  <!-- L mark — bold geometric -->
  <g filter="url(#glow)">
    <rect x="148" y="130" width="28" height="120" fill="url(#accent)" rx="6"/>
    <rect x="148" y="222" width="104" height="28" fill="url(#accent)" rx="6"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="52" cy="52" r="4" fill="#7c6ff7" opacity="0.4"/>
  <circle cx="348" cy="52" r="4" fill="#4fd1c5" opacity="0.4"/>
  <circle cx="52" cy="348" r="4" fill="#4fd1c5" opacity="0.4"/>
  <circle cx="348" cy="348" r="4" fill="#7c6ff7" opacity="0.4"/>

  <!-- LABRYX wordmark -->
  <text x="200" y="298" font-family="'Arial Black', sans-serif" font-weight="900" font-size="28" fill="#e2e8f0" text-anchor="middle" letter-spacing="6">LABRYX</text>
</svg>