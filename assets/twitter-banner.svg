<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="60%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#13131a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6ff7"/>
      <stop offset="100%" style="stop-color:#4fd1c5"/>
    </linearGradient>
    <linearGradient id="linegrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c6ff7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#7c6ff7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4fd1c5;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#7c6ff7" stroke-width="1">
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="400" x2="1500" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1050" y1="0" x2="1050" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
    <line x1="1350" y1="0" x2="1350" y2="500"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="750" cy="250" r="280" fill="#7c6ff7" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="300" cy="250" r="150" fill="#7c6ff7" opacity="0.03"/>
  <circle cx="1200" cy="250" r="150" fill="#4fd1c5" opacity="0.03"/>

  <!-- Terminal block — left side -->
  <g transform="translate(120, 130)">
    <rect width="520" height="240" rx="12" fill="#13131a" stroke="#1e1e2e" stroke-width="1.5"/>
    <!-- Terminal bar -->
    <rect width="520" height="36" rx="12" fill="#0d0d16"/>
    <rect y="24" width="520" height="12" fill="#0d0d16"/>
    <circle cx="20" cy="18" r="5" fill="#ff5f57"/>
    <circle cx="38" cy="18" r="5" fill="#febc2e"/>
    <circle cx="56" cy="18" r="5" fill="#28c840"/>
    <!-- Code lines -->
    <text x="20" y="72" font-family="'Courier New', monospace" font-size="15" fill="#4fd1c5">$</text>
    <text x="36" y="72" font-family="'Courier New', monospace" font-size="15" fill="#e2e8f0"> npm install -g labryx</text>
    <text x="20" y="98" font-family="'Courier New', monospace" font-size="13" fill="#64748b">+ labryx@0.1.0 added in 4s</text>
    <text x="20" y="130" font-family="'Courier New', monospace" font-size="15" fill="#4fd1c5">$</text>
    <text x="36" y="130" font-family="'Courier New', monospace" font-size="15" fill="#e2e8f0"> labryx workflow --interactive</text>
    <text x="20" y="162" font-family="'Courier New', monospace" font-size="13" fill="#7c6ff7">✔ Workflow "email-digest" created!</text>
    <text x="20" y="188" font-family="'Courier New', monospace" font-size="13" fill="#64748b">  Saved → ~/.labryx/workflows/email-digest.yaml</text>
    <text x="20" y="214" font-family="'Courier New', monospace" font-size="13" fill="#64748b">  Run: labryx workflow --run email-digest.yaml</text>
  </g>

  <!-- Right side — brand -->
  <g transform="translate(760, 150)">
    <!-- L mark -->
    <g filter="url(#glow)">
      <rect x="0" y="0" width="18" height="80" fill="url(#accent)" rx="4"/>
      <rect x="0" y="62" width="70" height="18" fill="url(#accent)" rx="4"/>
    </g>
    <!-- Brand name -->
    <text x="92" y="58" font-family="'Arial Black', sans-serif" font-weight="900" font-size="64" fill="#ffffff" letter-spacing="4">LABRYX</text>
    <!-- Tagline -->
    <text x="4" y="118" font-family="Arial, sans-serif" font-size="20" fill="#64748b" letter-spacing="1">AI workflow automation for the terminal</text>
    <!-- npm badge -->
    <rect x="4" y="148" width="220" height="36" rx="8" fill="#1e1e2e"/>
    <text x="20" y="171" font-family="'Courier New', monospace" font-size="15" fill="#4fd1c5">npm install -g labryx</text>
    <!-- labryx.dev -->
    <text x="4" y="230" font-family="Arial, sans-serif" font-size="18" fill="#7c6ff7" letter-spacing="1">labryx.dev</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="488" width="1500" height="2" fill="url(#linegrad)" opacity="0.6"/>
</svg>